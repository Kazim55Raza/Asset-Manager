version: '3.8'

services:
  # 🗄️ Database Service
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"

  # 📡 Backend API Service
  backend:
    build:
      context: ./backend # 👈 Change to your actual backend folder name
      dockerfile: Dockerfile
    ports:
      - "5201:5201"
    environment:
      - ConnectionStrings__DefaultConnection=Server=database;Database=AssetDb;User Id=sa;Password=YourStrong@Password123;Encrypt=False;
    depends_on:
      - database

  # 💻 Frontend Web Service
  frontend:
    build:
      context: ./frontend # 👈 Change to your actual frontend folder name
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend