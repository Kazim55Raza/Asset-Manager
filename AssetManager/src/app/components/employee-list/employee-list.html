<div *ngIf="toastMessage" class="fixed top-5 right-5 z-50 bg-slate-900 border border-emerald-500/30 text-emerald-400 px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 transition-all duration-300">
  <span class="font-medium text-sm text-white">{{ toastMessage }}</span>
</div>

<div class="mb-6">
  <h2 class="text-3xl font-bold text-white">Employee Management</h2>
  <p class="text-slate-400 mt-1">Manage system hardware users and network directory access allocations.</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  
  <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg h-fit">
    <h3 class="text-lg font-semibold text-white mb-4">
      {{ editingEmployeeId ? 'Modify Employee #' + editingEmployeeId : 'Add New Employee' }}
    </h3>
    
    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Full Name</label>
        <input type="text" formControlName="fullName" placeholder="e.g. John Doe" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500 transition-colors" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Email Address</label>
        <input type="email" formControlName="email" placeholder="john@company.com" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500 transition-colors" />
      </div>

      <div class="flex gap-2">
        <button type="button" *ngIf="editingEmployeeId" (click)="cancelEdit()" class="w-1/3 font-semibold py-2.5 rounded-lg text-sm bg-slate-700 hover:bg-slate-600 text-white transition-colors">
          Cancel
        </button>
        <button type="submit" [disabled]="employeeForm.invalid" [class.bg-amber-500]="editingEmployeeId" [class.hover:bg-amber-600]="editingEmployeeId" class="w-full font-semibold py-2.5 rounded-lg text-sm bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed text-slate-950 transition-colors shadow-md">
          {{ editingEmployeeId ? 'Apply Changes' : 'Save Employee Records' }}
        </button>
      </div>
    </form>
  </div>

  <div class="lg:col-span-2 bg-slate-800 border border-slate-700 rounded-xl shadow-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-900/40 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-700">
            <th class="px-6 py-3">ID</th>
            <th class="px-6 py-3">Full Name</th>
            <th class="px-6 py-3">Email Address</th>
            <th class="px-6 py-3 text-right">Actions</th> </tr>
        </thead>
        <tbody class="divide-y divide-slate-700/50 text-sm">
          <tr *ngFor="let emp of employeesList$ | async" class="hover:bg-slate-700/30 transition-colors">
            <td class="px-6 py-4 font-mono text-emerald-400">#{{emp.Id}}</td>
            <td class="px-6 py-4 font-medium text-white">{{emp.FullName}}</td>
            <td class="px-6 py-4 text-slate-300">{{emp.Email}}</td>
            <td class="px-6 py-4 text-right">
              <button (click)="onEdit(emp)" class="text-xs bg-slate-700 hover:bg-slate-600 text-amber-400 font-medium px-3 py-1.5 rounded-md transition-colors">
                ✏️ Edit
              </button>
              <button (click)="onDelete(emp.Id)" 
            class="text-xs bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white font-medium px-3 py-1.5 rounded-md transition-all duration-200">
      🗑️ Delete
    </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
