<div class="mb-6">
  <h2 class="text-3xl font-bold text-white">Hardware Asset Inventory</h2>
  <p class="text-slate-400 mt-1">Track and manage corporate infrastructure distribution.</p>
</div>

<div class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-900/40 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-700">
          <th class="px-6 py-3">Asset ID</th>
          <th class="px-6 py-3">Name</th>
          <th class="px-6 py-3">Asset Type</th>
          <th class="px-6 py-3">Serial Number</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-700/50 text-sm">
        <tr *ngFor="let asset of assetsList$ | async" class="hover:bg-slate-700/30 transition-colors">
          <td class="px-6 py-4 font-mono text-emerald-400">#{{asset.Id}}</td>
          <td class="px-6 py-4 font-medium text-white">{{asset.Name}}</td>
          <td class="px-6 py-4">
            <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-slate-700 text-slate-300">
              {{asset.AssignedToEmployee}}
            </span>
          </td>
          <td class="px-6 py-4 text-slate-400 font-mono text-xs">{{asset.SerialNumber}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
